<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="tela-inicial">
        <button id="btn-abrir">Abrir Presente 🎁</button>
    </div>
    <div class="container">
        <section class="slide slide-1">
            <div class="image-space">
                <img src="siren.gif" alt="" class="foto">
            </div>
            <h2>Atenção, Rafaela!</h2>
            <div class="scroll-indicator">👇</div>
        </section>
        <section class="slide slide-2">
            <div class="image-space">
                <video src="cansada.mp4" class="foto" loop playsinline></video>
            </div>
            <h2>A rotina tem sido intensa ultimamente...</h2>
            <div class="scroll-indicator">👇</div>
        </section>
        <section class="slide slide-3">
            <div class="image-space">
                <video src="cafe.mp4" class="foto" loop playsinline></video>
            </div>
            <h2>Trabalho, mestrado, casa, família, amigos...</h2>
            <div class="scroll-indicator">👇</div>
        </section>
        <section class="slide slide-4">
            <div class="image-space">
                <video src="banho_cropped.mp4" class="foto" loop playsinline></video>
            </div>
            <h2>E por isso merece uma folguinha!</h2>
            <div class="scroll-indicator">👇</div>
        </section>        
        <section class="slide slide-6">
            <div class="image-space">
                <video src="massagem.mp4" class="foto" loop playsinline></video>
            </div>
            <h2 class="final-message">Você ganhou uma massagem relaxante na<br><span class="logo-benfina">Benfina</span>!</h2>
            <div class="scroll-indicator">👇</div>
        </section>
        <section class="slide slide-5">
            <div class="image-space">
                <img src="bj.jpeg" alt="" class="foto">
            </div>
            <h2 class="final-message">Eu te amo ❤️</h2>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
